<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BeritaKu – Membaca Nyaman Bebas Iklan</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

    <style>
      :root {
        --cream: #faf6ef;
        --warm: #f5ede0;
        --gold: #c9943a;
        --gold-lt: #e2b96a;
        --gold-dk: #a0721e;
        --brown: #4a3520;
        --text: #2c1f0e;
        --muted: #9a8570;
        --white: #ffffff;
        --shadow: 0 8px 40px rgba(74, 53, 32, 0.13);
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "DM Sans", sans-serif;
        background: var(--cream);
        color: var(--text);
        min-height: 100vh;
        overflow-x: hidden;
      }

      /* ── NAV ── */
      nav {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 60px;
        height: 62px;
        background: var(--white);
        border-bottom: 1px solid rgba(201, 148, 58, 0.15);
        position: sticky;
        top: 0;
        z-index: 100;
      }

      .logo {
        font-family: "Playfair Display", serif;
        font-size: 1.45rem;
        font-weight: 800;
        color: var(--brown);
        letter-spacing: -0.5px;
      }

      .nav-links {
        display: flex;
        gap: 32px;
        list-style: none;
      }

      .nav-links a {
        text-decoration: none;
        font-size: 0.875rem;
        font-weight: 500;
        color: var(--muted);
        transition: color 0.2s;
      }

      .nav-links a:hover {
        color: var(--gold);
      }

      .nav-btn {
        background: var(--gold);
        color: var(--white);
        border: none;
        border-radius: 6px;
        padding: 8px 22px;
        font-family: "DM Sans", sans-serif;
        font-size: 0.85rem;
        font-weight: 600;
        cursor: pointer;
        transition:
          background 0.2s,
          transform 0.15s;
      }

      .nav-btn:hover {
        background: var(--gold-dk);
        transform: translateY(-1px);
      }

      /* ── HERO ── */
      .hero {
        display: grid;
        grid-template-columns: 1fr 1fr;
        align-items: center;
        min-height: calc(100vh - 62px);
        padding: 0 60px;
        position: relative;
        overflow: hidden;
      }

      /* soft background blobs */
      .hero::before {
        content: "";
        position: absolute;
        width: 560px;
        height: 560px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(201, 148, 58, 0.13) 0%, transparent 70%);
        right: -80px;
        bottom: -120px;
        pointer-events: none;
      }

      .hero::after {
        content: "";
        position: absolute;
        width: 320px;
        height: 320px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(201, 148, 58, 0.09) 0%, transparent 70%);
        left: 40px;
        top: 60px;
        pointer-events: none;
      }

      .hero-text {
        position: relative;
        z-index: 1;
      }

      .hero-text h1 {
        font-family: "Playfair Display", serif;
        font-size: clamp(2.8rem, 5vw, 4.2rem);
        font-weight: 800;
        line-height: 1.1;
        color: var(--brown);
        margin-bottom: 28px;
      }

      .hero-text h1 em {
        font-style: normal;
        color: var(--gold);
      }

      .hero-text p {
        font-size: 1rem;
        color: var(--muted);
        max-width: 380px;
        line-height: 1.7;
        margin-bottom: 36px;
      }

      .cta-btn {
        background: var(--gold);
        color: var(--white);
        border: none;
        border-radius: 8px;
        padding: 14px 34px;
        font-family: "DM Sans", sans-serif;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        letter-spacing: 0.2px;
        transition:
          background 0.2s,
          transform 0.15s,
          box-shadow 0.2s;
        box-shadow: 0 4px 18px rgba(201, 148, 58, 0.35);
      }

      .cta-btn:hover {
        background: var(--gold-dk);
        transform: translateY(-2px);
        box-shadow: 0 8px 24px rgba(201, 148, 58, 0.4);
      }

      /* illustration placeholder */
      .hero-illustration {
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative;
        z-index: 1;
      }

      .illus-card {
        background: var(--white);
        border-radius: 18px;
        padding: 20px 26px 16px;
        width: 280px;
        box-shadow: var(--shadow);
        position: relative;
      }

      .illus-card::before {
        content: "NEWS TODAY";
        display: block;
        background: var(--gold);
        color: var(--white);
        font-size: 0.6rem;
        font-weight: 700;
        letter-spacing: 1px;
        padding: 4px 10px;
        border-radius: 4px;
        width: fit-content;
        margin-bottom: 12px;
      }

      .illus-line {
        height: 8px;
        border-radius: 4px;
        background: var(--warm);
        margin-bottom: 8px;
      }

      .illus-line.short {
        width: 60%;
      }
      .illus-line.med {
        width: 80%;
      }

      .illus-img-box {
        width: 100%;
        height: 100px;
        background: linear-gradient(135deg, var(--warm) 0%, #edd9b8 100%);
        border-radius: 10px;
        margin-top: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2.4rem;
      }

      /* plant decor */
      .plant {
        position: absolute;
        right: 60px;
        bottom: 0;
        font-size: 6rem;
        opacity: 0.55;
        pointer-events: none;
        user-select: none;
      }

      /* ── MODAL OVERLAY ── */
      .overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(44, 31, 14, 0.45);
        backdrop-filter: blur(3px);
        z-index: 200;
        align-items: center;
        justify-content: center;
      }

      .overlay.open {
        display: flex;
      }

      .modal {
        background: #fdf8f2;
        border-radius: 20px;
        padding: 40px 44px 36px;
        width: 360px;
        box-shadow: 0 24px 64px rgba(44, 31, 14, 0.22);
        animation: popIn 0.28s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        position: relative;
      }

      @keyframes popIn {
        from {
          opacity: 0;
          transform: scale(0.88) translateY(16px);
        }
        to {
          opacity: 1;
          transform: scale(1) translateY(0);
        }
      }

      .modal-close {
        position: absolute;
        top: 14px;
        right: 18px;
        background: none;
        border: none;
        font-size: 1.3rem;
        color: var(--muted);
        cursor: pointer;
        line-height: 1;
        transition: color 0.15s;
      }

      .modal-close:hover {
        color: var(--brown);
      }

      .modal h2 {
        font-family: "Playfair Display", serif;
        font-size: 1.65rem;
        font-weight: 800;
        color: var(--brown);
        text-align: center;
        margin-bottom: 24px;
      }

      .sso-btn {
        display: flex;
        align-items: center;
        gap: 12px;
        width: 100%;
        padding: 11px 18px;
        border-radius: 9px;
        border: 1.5px solid rgba(201, 148, 58, 0.3);
        background: var(--white);
        font-family: "DM Sans", sans-serif;
        font-size: 0.9rem;
        font-weight: 500;
        color: var(--brown);
        cursor: pointer;
        margin-bottom: 10px;
        transition:
          border-color 0.2s,
          background 0.2s,
          transform 0.15s;
      }

      .sso-btn:hover {
        border-color: var(--gold);
        background: #fffbf5;
        transform: translateX(3px);
      }

      .sso-btn .icon {
        width: 22px;
        height: 22px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.8rem;
        font-weight: 700;
        flex-shrink: 0;
      }

      .icon-google {
        background: #fff3e0;
        color: #ea4335;
      }
      .icon-fb {
        background: #e8f0fe;
        color: #1877f2;
      }
      .icon-apple {
        background: #f0f0f0;
        color: #000;
      }
      .icon-x {
        background: #f0f0f0;
        color: #000;
      }

      .divider {
        display: flex;
        align-items: center;
        gap: 10px;
        margin: 18px 0 16px;
        color: var(--muted);
        font-size: 0.78rem;
      }

      .divider::before,
      .divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: rgba(201, 148, 58, 0.2);
      }

      .email-input {
        width: 100%;
        padding: 11px 14px;
        border: 1.5px solid rgba(201, 148, 58, 0.25);
        border-radius: 9px;
        font-family: "DM Sans", sans-serif;
        font-size: 0.9rem;
        color: var(--text);
        background: var(--white);
        outline: none;
        transition: border-color 0.2s;
        margin-bottom: 10px;
      }

      .email-input:focus {
        border-color: var(--gold);
      }

      .modal-submit {
        width: 100%;
        padding: 12px;
        border-radius: 9px;
        border: none;
        background: var(--gold);
        color: var(--white);
        font-family: "DM Sans", sans-serif;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
        transition:
          background 0.2s,
          transform 0.15s;
        box-shadow: 0 4px 16px rgba(201, 148, 58, 0.3);
      }

      .modal-submit:hover {
        background: var(--gold-dk);
        transform: translateY(-1px);
      }

      .modal-footer {
        text-align: center;
        font-size: 0.8rem;
        color: var(--muted);
        margin-top: 18px;
        line-height: 1.6;
      }

      .modal-footer a {
        color: var(--gold);
        text-decoration: none;
        font-weight: 500;
      }

      /* ── RESPONSIVE ── */
      @media (max-width: 768px) {
        nav {
          padding: 0 20px;
        }

        .hero {
          grid-template-columns: 1fr;
          padding: 48px 24px 40px;
          text-align: center;
          gap: 40px;
        }

        .hero::before,
        .hero::after {
          display: none;
        }

        .hero-text p {
          max-width: 100%;
          margin-inline: auto;
        }

        .plant {
          right: 10px;
          font-size: 3.5rem;
        }

        .modal {
          width: calc(100vw - 40px);
          padding: 32px 24px 28px;
        }
      }

      /* fade-in on load */
      .hero-text,
      .hero-illustration {
        animation: fadeUp 0.6s ease both;
      }

      .hero-illustration {
        animation-delay: 0.15s;
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(24px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <!-- NAV -->
    <nav>
      <span class="logo">BeritaKu</span>
      <ul class="nav-links">
        <li><a href="Homepage.html">Berita</a></li>
        <li><a href="#">Produk</a></li>
        <li><a href="#">Karir</a></li>
      </ul>
      <button class="nav-btn" onclick="openModal()">Masuk</button>
    </nav>

    <!-- HERO -->
    <section class="hero">
      <div class="hero-text">
        <h1>Membaca<br />Nyaman<br /><em>Bebas Iklan</em></h1>
        <p>Nikmati ribuan artikel pilihan tanpa gangguan. Satu platform, semua berita terpercaya di ujung jari Anda.</p>
        <button class="cta-btn" onclick="openModal()">Mulai Membaca</button>
      </div>

      <div class="hero-illustration">
        <div class="illus-card">
          <div class="illus-line med"></div>
          <div class="illus-line short"></div>
          <div class="illus-line med"></div>
          <div class="illus-img-box">📰</div>
        </div>
        <div class="plant">🌿</div>
      </div>
    </section>

    <!-- MODAL -->
    <div class="overlay" id="overlay" onclick="handleOverlayClick(event)">
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <button class="modal-close" onclick="closeModal()" aria-label="Tutup">&times;</button>
        <h2 id="modal-title">Selamat Datang</h2>

        <button class="sso-btn">
          <span class="icon icon-google">G</span>
          Masuk dengan Google
        </button>
        <button class="sso-btn">
          <span class="icon icon-fb">f</span>
          Masuk dengan Facebook
        </button>
        <button class="sso-btn">
          <span class="icon icon-apple">&#xf8ff;</span>
          Masuk dengan Apple
        </button>
        <button class="sso-btn">
          <span class="icon icon-x">𝕏</span>
          Masuk dengan X
        </button>

        <div class="divider">atau masuk dengan email</div>

        <input class="email-input" type="email" placeholder="Alamat email Anda" />
        <input class="email-input" type="password" placeholder="Kata sandi" />
        <a href="Homepage.html">
          <button class="modal-submit">Masuk</button>
        </a>
        <div class="modal-footer">
          Belum punya akun? <a href="#">Daftar di sini</a><br />
          Lupa sandi atau ada kendala masuk? <a href="#">Bantuan</a>
        </div>
      </div>
    </div>

    <script>
      function openModal() {
        document.getElementById("overlay").classList.add("open");
        document.body.style.overflow = "hidden";
      }

      function closeModal() {
        document.getElementById("overlay").classList.remove("open");
        document.body.style.overflow = "";
      }

      function handleOverlayClick(e) {
        if (e.target === document.getElementById("overlay")) closeModal();
      }

      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") closeModal();
      });
    </script>
  </body>
</html>
